<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Antigravity Agent Manager — Mobile Interface">
  <title>Antigravity Mobile</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=3">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div class="header-left">
        <button id="btn-menu" class="icon-btn" onclick="toggleSidebar()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="header-title">
          <span class="title-icon">◆</span>
          <span class="title-text">Antigravity</span>
        </div>
      </div>
      <div class="header-right">
        <div id="status-dot" class="status-dot offline" title="Offline"></div>
        <button id="btn-new" class="icon-btn" onclick="newConversation()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
    </header>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar hidden">
      <div class="sidebar-header">
        <h3>Conversas</h3>
        <button class="icon-btn" onclick="toggleSidebar()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div id="conversation-list" class="conversation-list">
        <div class="empty-state">Nenhuma conversa ainda</div>
      </div>
    </aside>
    <div id="sidebar-overlay" class="sidebar-overlay hidden" onclick="toggleSidebar()"></div>

    <!-- Chat Area -->
    <main id="chat-area">
      <!-- Welcome Screen -->
      <div id="welcome-screen" class="welcome-screen">
        <div class="welcome-icon">◆</div>
        <h1>Antigravity Mobile</h1>
        <p class="welcome-sub">Seu Agent Manager, direto no celular.</p>
        <div class="welcome-hints">
          <button class="hint-chip" onclick="sendHint(this)">Analise o projeto atual</button>
          <button class="hint-chip" onclick="sendHint(this)">Liste os arquivos abertos</button>
          <button class="hint-chip" onclick="sendHint(this)">Crie um componente React</button>
          <button class="hint-chip" onclick="sendHint(this)">Encontre bugs no código</button>
        </div>
      </div>

      <!-- Messages Container -->
      <div id="messages" class="messages"></div>
    </main>

    <!-- Input Area -->
    <footer id="input-area">
      <div class="input-wrapper">
        <button id="btn-attach" class="icon-btn" onclick="document.getElementById('file-upload').click()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg>
        </button>
        <input type="file" id="file-upload" style="display: none;" onchange="handleFileUpload(event)">
        <textarea id="msg-input" placeholder="Envie uma mensagem ao agente..." rows="1" oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
        <button id="btn-send" class="send-btn" onclick="sendMessage()" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="input-footer">
        <span class="model-label" id="model-label">Bridge Mode</span>
      </div>
    </footer>
  </div>

  <!-- Scripts -->
  <script src="/app_v2.js?v=3"></script>
</body>
</html>
